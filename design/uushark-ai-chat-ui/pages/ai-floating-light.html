<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 浮窗 - 亮色模式</title>
    <style id="theme-vars">
/*
 * UU鲨 AI Chat UI — Brand Design Tokens
 * Based on UU鲨 existing design system (Apple-inspired, brand-500: #007aff)
 * Extended with AI chat-specific tokens per UI redesign guide
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff;
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759;
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30;
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* TYPOGRAPHY */
  --font-sans: "Noto Sans CJK SC", "Noto Sans", sans-serif;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;
  --radius-compact: 8px;
  --radius-button: 6px;
  --radius-tag: 4px;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12);

  /* SPACING */
  --spacing: 0.24rem;

  /* ===== AI CHAT SPECIFIC TOKENS ===== */

  /* Conversation list */
  --conversation-active-bar: var(--brand-500);
  --conversation-active-bg: var(--brand-50);

  /* Code block */
  --code-bg: rgba(0, 0, 0, 0.06);

  /* Layout dimensions */
  --floating-width: 480px;
  --floating-height: 600px;
  --floating-min-width: 360px;
  --floating-min-height: 450px;
  --conversation-list-width: 160px;
  --conversation-list-collapsed-width: 40px;
}

/* ===== SEMANTIC ROLES - dark ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);

  --conversation-active-bar: var(--brand-400);
  --conversation-active-bg: rgba(46, 141, 255, 0.12);
  --code-bg: rgba(255, 255, 255, 0.06);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <main>

      <!-- ====== FLOATING WINDOW ====== -->
      <div style="
        width: var(--floating-width);
        height: var(--floating-height);
        background: var(--popover);
        border-radius: var(--radius-compact);
        box-shadow: var(--shadow-xl);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: var(--font-sans);
        font-size: 13px;
      ">

        <!-- ====== TITLE BAR ====== -->
        <div style="
          height: 36px;
          min-height: 36px;
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          padding: 0 8px 0 10px;
          gap: 6px;
        ">
          <!-- Left: Shark icon + title -->
          <div style="display: flex; align-items: center; gap: 5px; flex-shrink: 0;">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2L3 12L6 10L8 14L10 10L13 12L8 2Z" fill="var(--primary)"/>
            </svg>
            <span style="font-size: 13px; font-weight: 600; color: var(--foreground);">UU鲨</span>
          </div>

          <!-- Center: Profile selector -->
          <div style="flex: 1; display: flex; justify-content: center;">
            <button style="
              display: flex;
              align-items: center;
              gap: 4px;
              padding: 2px 8px;
              border: none;
              background: transparent;
              border-radius: var(--radius-button);
              cursor: pointer;
              font-family: var(--font-sans);
              font-size: 12px;
              color: var(--muted-foreground);
            ">
              <span>DeepSeek</span>
              <!-- Capability dots -->
              <span style="display: flex; gap: 3px; margin-right: 2px;">
                <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--primary);"></span>
                <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--muted-foreground);"></span>
              </span>
              <!-- Chevron down -->
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M2.5 3.75L5 6.25L7.5 3.75" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <!-- Right: Window controls -->
          <div style="display: flex; align-items: center; gap: 2px; flex-shrink: 0;">
            <!-- New conversation -->
            <button style="
              width: 24px; height: 24px;
              display: flex; align-items: center; justify-content: center;
              border: none; background: transparent;
              border-radius: var(--radius-button);
              cursor: pointer; color: var(--icon-muted);
            ">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 2V12M2 7H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <!-- Minimize -->
            <button style="
              width: 24px; height: 24px;
              display: flex; align-items: center; justify-content: center;
              border: none; background: transparent;
              border-radius: var(--radius-button);
              cursor: pointer; color: var(--icon-muted);
            ">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 7H11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <!-- Close -->
            <button style="
              width: 24px; height: 24px;
              display: flex; align-items: center; justify-content: center;
              border: none; background: transparent;
              border-radius: var(--radius-button);
              cursor: pointer; color: var(--icon-muted);
            ">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 3L11 11M11 3L3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- ====== BODY ====== -->
        <div style="flex: 1; display: flex; overflow: hidden;">

          <!-- ====== LEFT PANEL - CONVERSATION LIST ====== -->
          <div style="
            width: var(--conversation-list-width);
            min-width: var(--conversation-list-width);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--popover);
          ">
            <!-- New conversation button -->
            <div style="padding: 8px 8px 6px 8px;">
              <button style="
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 6px 0;
                border: none;
                background: var(--secondary);
                border-radius: var(--radius-button);
                cursor: pointer;
                font-family: var(--font-sans);
                font-size: 12px;
                color: var(--foreground);
              ">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M6 1V11M1 6H11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <span>新建会话</span>
              </button>
            </div>

            <!-- Conversation list -->
            <div style="flex: 1; overflow-y: auto; padding: 0 4px;">
              <!-- Active conversation -->
              <div style="
                position: relative;
                padding: 7px 10px;
                border-radius: var(--radius-button);
                background: var(--conversation-active-bg);
                cursor: pointer;
                overflow: hidden;
              ">
                <div style="
                  position: absolute;
                  left: 0; top: 0; bottom: 0;
                  width: 3px;
                  background: var(--conversation-active-bar);
                  border-radius: 0 2px 2px 0;
                "></div>
                <span style="
                  font-size: 13px;
                  color: var(--foreground);
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  display: block;
                  padding-left: 2px;
                ">帮我写一篇作文</span>
              </div>

              <!-- Inactive conversation 1 -->
              <div style="
                position: relative;
                padding: 7px 10px;
                border-radius: var(--radius-button);
                cursor: pointer;
                overflow: hidden;
              ">
                <span style="
                  font-size: 13px;
                  color: var(--muted-foreground);
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  display: block;
                ">Vue 3 组合式 API 介绍</span>
                <!-- Trash icon (visible on hover, shown here for reference) -->
                <span style="
                  position: absolute;
                  top: 6px; right: 6px;
                  width: 12px; height: 12px;
                  color: var(--destructive);
                  display: flex; align-items: center; justify-content: center;
                  opacity: 0;
                ">
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <path d="M1.5 2.5H8.5M3.75 2.5V1.875C3.75 1.66789 3.91789 1.5 4.125 1.5H5.875C6.08211 1.5 6.25 1.66789 6.25 1.875V2.5M4.375 4.375V7.125M5.625 4.375V7.125M2.5 2.5L2.8125 7.75C2.84411 8.30711 3.30429 8.75 3.8625 8.75H6.1375C6.69571 8.75 7.15589 8.30711 7.1875 7.75L7.5 2.5" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </div>

              <!-- Inactive conversation 2 -->
              <div style="
                position: relative;
                padding: 7px 10px;
                border-radius: var(--radius-button);
                cursor: pointer;
                overflow: hidden;
              ">
                <span style="
                  font-size: 13px;
                  color: var(--muted-foreground);
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  display: block;
                ">解释量子计算的基本原理</span>
                <!-- Trash icon (visible on hover) -->
                <span style="
                  position: absolute;
                  top: 6px; right: 6px;
                  width: 12px; height: 12px;
                  color: var(--destructive);
                  display: flex; align-items: center; justify-content: center;
                  opacity: 0;
                ">
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <path d="M1.5 2.5H8.5M3.75 2.5V1.875C3.75 1.66789 3.91789 1.5 4.125 1.5H5.875C6.08211 1.5 6.25 1.66789 6.25 1.875V2.5M4.375 4.375V7.125M5.625 4.375V7.125M2.5 2.5L2.8125 7.75C2.84411 8.30711 3.30429 8.75 3.8625 8.75H6.1375C6.69571 8.75 7.15589 8.30711 7.1875 7.75L7.5 2.5" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </div>
            </div>

            <!-- Empty state hint (greyed out) -->
            <div style="
              padding: 8px 10px;
              text-align: center;
              font-size: 11px;
              color: var(--muted-foreground);
              opacity: 0.5;
            ">点击上方新建会话开始对话</div>
          </div>

          <!-- ====== RIGHT PANEL - CHAT AREA ====== -->
          <div style="flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;">

            <!-- (a) TOOL STATUS BAR -->
            <div style="
              padding: 4px 12px;
              background: var(--secondary);
              display: flex;
              align-items: center;
              gap: 5px;
              font-size: 11px;
              color: var(--muted-foreground);
              border-bottom: 1px solid var(--border);
            ">
              <!-- Spinning loader -->
              <svg class="spinner" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="6" r="4.5" stroke="var(--muted-foreground)" stroke-width="1.2" stroke-dasharray="14 14" stroke-linecap="round" opacity="0.3"/>
                <path d="M6 1.5A4.5 4.5 0 0 1 10.5 6" stroke="var(--muted-foreground)" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              <span>正在调用 web_search...</span>
            </div>

            <!-- (b) MESSAGE AREA -->
            <div style="flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;">

              <!-- User message (right-aligned) -->
              <div style="display: flex; justify-content: flex-end;">
                <div style="
                  max-width: 80%;
                  padding: 8px 12px;
                  background: var(--primary);
                  color: var(--primary-foreground);
                  border-radius: var(--radius-compact);
                  font-size: 13px;
                  line-height: 1.5;
                  word-break: break-word;
                ">帮我写一篇关于秋天的作文，要求字数在800字左右</div>
              </div>

              <!-- Timestamp -->
              <div style="text-align: center; font-size: 11px; color: var(--muted-foreground);">14:32</div>

              <!-- AI message (left-aligned) -->
              <div style="display: flex; justify-content: flex-start;">
                <div style="
                  max-width: 80%;
                  padding: 8px 12px;
                  background: var(--secondary);
                  color: var(--foreground);
                  border-radius: var(--radius-compact);
                  font-size: 13px;
                  line-height: 1.6;
                  word-break: break-word;
                "><strong>秋天的小路</strong>

秋天来了，树叶变成了金黄色，一片片从枝头飘落，像蝴蝶一样在空中飞舞。我走在乡间的小路上，脚下的落叶发出沙沙的声响，仿佛在诉说着季节的故事。

远处的山峦被薄雾笼罩，若隐若现。田野里，稻谷已经成熟，金黄的稻穗在微风中轻轻摇摆，像是一片金色的海洋。</div>
              </div>

            </div>

            <!-- (c) IMAGE PREVIEW ROW -->
            <div style="
              padding: 0 12px 4px 12px;
              display: flex;
              align-items: center;
              gap: 4px;
            ">
              <!-- Image thumbnail 1 -->
              <div style="
                position: relative;
                width: 48px; height: 48px;
                background: var(--secondary);
                border-radius: var(--radius-tag);
                border: 1px solid var(--border);
                flex-shrink: 0;
              ">
                <div style="
                  position: absolute;
                  top: -4px; right: -4px;
                  width: 14px; height: 14px;
                  border-radius: 50%;
                  background: var(--destructive);
                  display: flex; align-items: center; justify-content: center;
                  cursor: pointer;
                ">
                  <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
                    <path d="M2 2L6 6M6 2L2 6" stroke="var(--destructive-foreground)" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                </div>
              </div>
              <!-- Image thumbnail 2 -->
              <div style="
                position: relative;
                width: 48px; height: 48px;
                background: var(--secondary);
                border-radius: var(--radius-tag);
                border: 1px solid var(--border);
                flex-shrink: 0;
              ">
                <div style="
                  position: absolute;
                  top: -4px; right: -4px;
                  width: 14px; height: 14px;
                  border-radius: 50%;
                  background: var(--destructive);
                  display: flex; align-items: center; justify-content: center;
                  cursor: pointer;
                ">
                  <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
                    <path d="M2 2L6 6M6 2L2 6" stroke="var(--destructive-foreground)" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                </div>
              </div>
            </div>

            <!-- (d) INPUT AREA -->
            <div style="
              border-top: 1px solid var(--border);
              padding: 8px 12px;
              display: flex;
              flex-direction: column;
              gap: 6px;
            ">
              <!-- Tool buttons row -->
              <div style="display: flex; align-items: center; gap: 4px;">
                <!-- Web search button (ACTIVE) -->
                <button style="
                  width: 28px; height: 28px;
                  display: flex; align-items: center; justify-content: center;
                  border: none;
                  background: var(--primary);
                  border-radius: var(--radius-button);
                  cursor: pointer;
                  flex-shrink: 0;
                ">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    <path d="M4 6C4 4.89543 4.89543 4 6 4C6.55228 4 7.05228 4.22386 7.41421 4.58579" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
                  </svg>
                </button>
                <!-- Image upload button (inactive) -->
                <button style="
                  width: 28px; height: 28px;
                  display: flex; align-items: center; justify-content: center;
                  border: none;
                  background: transparent;
                  border-radius: var(--radius-button);
                  cursor: pointer;
                  color: var(--icon-muted);
                  flex-shrink: 0;
                ">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M1 10V11.5C1 12.0523 1.44772 12.5 2 12.5H12C12.5523 12.5 13 12.0523 13 11.5V6.5C13 5.94772 12.5523 5.5 12 5.5H9L7.5 3.5H2C1.44772 3.5 1 3.94772 1 4.5V10Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                    <path d="M4.5 8.5C4.5 7.39543 5.39543 6.5 6.5 6.5C7.05228 6.5 7.55228 6.72386 7.91421 7.08579" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
                  </svg>
                </button>
                <!-- Spacer -->
                <div style="flex: 1;"></div>
              </div>
              <!-- Input + Send row -->
              <div style="display: flex; align-items: flex-end; gap: 6px;">
                <div style="
                  flex: 1;
                  min-height: 36px;
                  max-height: 80px;
                  padding: 7px 10px;
                  background: var(--secondary);
                  color: var(--foreground);
                  border: 1px solid var(--border);
                  border-radius: var(--radius-button);
                  font-family: var(--font-sans);
                  font-size: 13px;
                  line-height: 1.4;
                  overflow-y: auto;
                  word-break: break-word;
                "><span style="color: var(--muted-foreground);">输入消息...</span></div>
                <!-- Send button (enabled) -->
                <button style="
                  width: 28px; height: 28px;
                  display: flex; align-items: center; justify-content: center;
                  border: none;
                  background: var(--primary);
                  border-radius: var(--radius-button);
                  cursor: pointer;
                  flex-shrink: 0;
                ">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M7 2L7 12M7 12L4 9M7 12L10 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- (e) RESIZE HANDLE -->
            <div style="
              position: absolute;
              bottom: 0; right: 0;
              width: 12px; height: 12px;
              cursor: nwse-resize;
            ">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M11 11L11 5M11 11L5 11" stroke="var(--border)" stroke-width="1" stroke-linecap="round"/>
              </svg>
            </div>

          </div>
        </div>
      </div>

    </main>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-sans);
        background: var(--background-100);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .spinner {
        animation: spin 1s linear infinite;
      }
    </style>
</body>
</html>
