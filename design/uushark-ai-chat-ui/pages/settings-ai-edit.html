<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - AI配置</title>
    <style id="theme-vars">
/*
 * UU鲨 AI Chat UI — Brand Design Tokens
 * Based on UU鲨 existing design system (Apple-inspired, brand-500: #007aff)
 * Extended with AI chat-specific tokens per UI redesign guide
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff;
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759;
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30;
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* TYPOGRAPHY */
  --font-sans: "Noto Sans CJK SC", "Noto Sans", sans-serif;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;
  --radius-compact: 8px;
  --radius-button: 6px;
  --radius-tag: 4px;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12);

  /* SPACING */
  --spacing: 0.24rem;

  /* ===== AI CHAT SPECIFIC TOKENS ===== */

  /* Conversation list */
  --conversation-active-bar: var(--brand-500);
  --conversation-active-bg: var(--brand-50);

  /* Code block */
  --code-bg: rgba(0, 0, 0, 0.06);

  /* Layout dimensions */
  --floating-width: 480px;
  --floating-height: 600px;
  --floating-min-width: 360px;
  --floating-min-height: 450px;
  --conversation-list-width: 160px;
  --conversation-list-collapsed-width: 40px;
}

/* ===== SEMANTIC ROLES - dark ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);

  --conversation-active-bar: var(--brand-400);
  --conversation-active-bg: rgba(46, 141, 255, 0.12);
  --code-bg: rgba(255, 255, 255, 0.06);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <main>
    <div class="settings-container">

      <!-- Title -->
      <div class="settings-title">AI 配置</div>

      <!-- Profile List -->
      <div class="profile-list">
        <!-- DeepSeek -->
        <div class="profile-item">
          <div class="profile-info">
            <div class="profile-name-row">
              <span class="profile-name">DeepSeek</span>
            </div>
            <div class="profile-meta">deepseek-chat · 联网✓ · 图片✗</div>
          </div>
          <div class="profile-actions">
            <button class="profile-btn">编辑</button>
            <button class="profile-btn">删除</button>
          </div>
        </div>

        <!-- OpenAI (editing) -->
        <div class="profile-item editing">
          <div class="profile-info">
            <div class="profile-name-row">
              <span class="profile-name">OpenAI</span>
              <span class="profile-editing-badge">编辑中</span>
            </div>
            <div class="profile-meta">gpt-4o-mini · 联网✓ · 图片✓</div>
          </div>
          <div class="profile-actions">
            <button class="profile-btn">编辑</button>
            <button class="profile-btn">删除</button>
          </div>
        </div>

        <!-- Ollama 本地 -->
        <div class="profile-item">
          <div class="profile-info">
            <div class="profile-name-row">
              <span class="profile-name">Ollama 本地</span>
            </div>
            <div class="profile-meta">llama3.1 · 联网✗ · 图片✗</div>
          </div>
          <div class="profile-actions">
            <button class="profile-btn">编辑</button>
            <button class="profile-btn">删除</button>
          </div>
        </div>
      </div>

      <!-- Separator -->
      <div class="edit-separator">编辑配置</div>

      <!-- Edit Form -->
      <div class="edit-form">

        <!-- 名称 -->
        <div class="form-row">
          <label class="form-label">名称</label>
          <div class="form-input-wrapper">
            <input type="text" class="form-input" value="我的 OpenAI" />
          </div>
        </div>

        <!-- 服务商 -->
        <div class="form-row">
          <label class="form-label">服务商</label>
          <div class="form-input-wrapper">
            <select class="form-select">
              <option value="openai" selected>OpenAI</option>
              <option value="anthropic">Anthropic</option>
              <option value="deepseek">DeepSeek</option>
              <option value="ollama">Ollama</option>
            </select>
            <span class="select-chevron">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- API Key -->
        <div class="form-row">
          <label class="form-label">API Key</label>
          <div class="api-key-wrapper">
            <input type="password" class="form-input" value="sk-proj-xxxxxxxxxxxx ••••" />
            <button class="eye-toggle" title="切换显示">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- API URL -->
        <div class="form-row">
          <label class="form-label">API URL</label>
          <div class="form-input-wrapper">
            <input type="text" class="form-input" value="https://api.openai.com/v1" />
          </div>
        </div>

        <!-- 模型 -->
        <div class="form-row">
          <label class="form-label">模型</label>
          <div class="form-input-wrapper">
            <input type="text" class="form-input" value="gpt-4o-mini" />
          </div>
        </div>

        <!-- 温度 -->
        <div class="form-row">
          <label class="form-label">温度</label>
          <div class="range-wrapper">
            <input type="range" class="range-slider" min="0" max="2" step="0.1" value="0.7" />
            <span class="range-value">0.7</span>
          </div>
        </div>

        <!-- Max Tokens -->
        <div class="form-row">
          <label class="form-label">Max Tokens</label>
          <div class="form-input-wrapper">
            <input type="number" class="form-input" value="4096" />
          </div>
        </div>

        <!-- 模型能力 -->
        <div class="capability-row">
          <span class="capability-label">模型能力:</span>
          <span class="capability-tag">联网&#10003;</span>
          <span class="capability-tag">图片&#10003;</span>
          <span class="capability-auto">（自动检测）</span>
        </div>

        <!-- Buttons -->
        <div class="form-buttons">
          <button class="btn btn-ghost">测试连接</button>
          <button class="btn btn-ghost">取消</button>
          <button class="btn btn-primary">保存</button>
        </div>

      </div>

    </div>
  </main>

    <style>
      /* Page-level styles */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--background);
        color: var(--foreground);
        font-family: var(--font-sans);
        font-size: 13px;
        line-height: 1.5;
        letter-spacing: var(--tracking-normal);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .settings-container {
        width: 600px;
        margin: 0 auto;
        padding: 32px 0;
      }

      .settings-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--foreground);
        margin-bottom: 16px;
        padding-left: 2px;
      }

      /* Profile list card */
      .profile-list {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-compact);
        box-shadow: var(--shadow-xs);
        overflow: hidden;
        margin-bottom: 20px;
      }

      .profile-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      .profile-item:last-child {
        border-bottom: none;
      }

      .profile-item.editing {
        background: var(--conversation-active-bg);
        border-left: 3px solid var(--primary);
      }

      .profile-info {
        flex: 1;
        min-width: 0;
      }

      .profile-name-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .profile-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--foreground);
      }

      .profile-editing-badge {
        font-size: 11px;
        color: var(--primary);
        background: var(--primary-foreground);
        padding: 1px 6px;
        border-radius: var(--radius-tag);
        border: 1px solid var(--primary);
        font-weight: 400;
      }

      .profile-meta {
        font-size: 11px;
        color: var(--muted-foreground);
        margin-top: 2px;
        font-family: var(--font-mono);
      }

      .profile-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .profile-btn {
        font-size: 12px;
        color: var(--muted-foreground);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: var(--radius-button);
        font-family: var(--font-sans);
      }
      .profile-btn:hover {
        color: var(--foreground);
        background: var(--secondary);
      }

      /* Separator */
      .edit-separator {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        color: var(--muted-foreground);
        font-size: 12px;
      }
      .edit-separator::before,
      .edit-separator::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Edit form */
      .edit-form {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-compact);
        box-shadow: var(--shadow-xs);
        padding: 20px;
      }

      .form-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      }
      .form-row:last-of-type {
        margin-bottom: 16px;
      }

      .form-label {
        width: 80px;
        flex-shrink: 0;
        text-align: right;
        padding-right: 12px;
        font-size: 12px;
        color: var(--muted-foreground);
        line-height: 32px;
      }

      .form-input-wrapper {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
      }

      .form-input {
        width: 100%;
        height: 32px;
        background: var(--secondary);
        color: var(--foreground);
        border: 1px solid var(--border);
        border-radius: var(--radius-button);
        padding: 0 10px;
        font-size: 13px;
        font-family: var(--font-sans);
        line-height: 32px;
        outline: none;
        transition: border-color 0.15s;
      }
      .form-input:focus {
        border-color: var(--ring);
      }

      .form-select {
        width: 100%;
        height: 32px;
        background: var(--secondary);
        color: var(--foreground);
        border: 1px solid var(--border);
        border-radius: var(--radius-button);
        padding: 0 30px 0 10px;
        font-size: 13px;
        font-family: var(--font-sans);
        line-height: 32px;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .form-select:focus {
        border-color: var(--ring);
      }

      .select-chevron {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--icon-muted);
      }

      .api-key-wrapper {
        display: flex;
        align-items: center;
        flex: 1;
      }

      .api-key-wrapper .form-input {
        flex: 1;
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }

      .eye-toggle {
        height: 32px;
        width: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--secondary);
        border: 1px solid var(--border);
        border-left: none;
        border-radius: 0 var(--radius-button) var(--radius-button) 0;
        cursor: pointer;
        color: var(--icon-muted);
        outline: none;
      }
      .eye-toggle:hover {
        color: var(--icon);
      }

      /* Range slider */
      .range-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .range-slider {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      .range-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: var(--primary);
        border-radius: 50%;
        border: none;
        cursor: pointer;
      }
      .range-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: var(--primary);
        border-radius: 50%;
        border: none;
        cursor: pointer;
      }
      .range-slider::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 2px;
      }

      .range-value {
        font-size: 13px;
        color: var(--foreground);
        font-family: var(--font-mono);
        min-width: 28px;
        text-align: right;
      }

      /* Capability tags */
      .capability-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        padding-left: 92px;
      }

      .capability-label {
        font-size: 12px;
        color: var(--muted-foreground);
      }

      .capability-tag {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: var(--radius-tag);
        background: var(--state-success-surface);
        color: var(--success);
        font-weight: 500;
      }

      .capability-auto {
        font-size: 11px;
        color: var(--muted-foreground);
      }

      /* Buttons row */
      .form-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding-top: 4px;
      }

      .btn {
        font-size: 13px;
        font-family: var(--font-sans);
        padding: 6px 16px;
        border-radius: var(--radius-button);
        cursor: pointer;
        outline: none;
        border: none;
        font-weight: 500;
        line-height: 1.5;
      }

      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--foreground);
      }
      .btn-ghost:hover {
        background: var(--secondary);
      }

      .btn-primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
    </style>
</body>
</html>
