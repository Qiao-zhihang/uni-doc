<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - AI 配置</title>
    <style id="theme-vars">
/*
 * UU鲨 AI Chat UI — Brand Design Tokens
 * Based on UU鲨 existing design system (Apple-inspired, brand-500: #007aff)
 * Extended with AI chat-specific tokens per UI redesign guide
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff;
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759;
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30;
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* TYPOGRAPHY */
  --font-sans: "Noto Sans CJK SC", "Noto Sans", sans-serif;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;
  --radius-compact: 8px;
  --radius-button: 6px;
  --radius-tag: 4px;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12);

  /* SPACING */
  --spacing: 0.24rem;

  /* ===== AI CHAT SPECIFIC TOKENS ===== */

  /* Conversation list */
  --conversation-active-bar: var(--brand-500);
  --conversation-active-bg: var(--brand-50);

  /* Code block */
  --code-bg: rgba(0, 0, 0, 0.06);

  /* Layout dimensions */
  --floating-width: 480px;
  --floating-height: 600px;
  --floating-min-width: 360px;
  --floating-min-height: 450px;
  --conversation-list-width: 160px;
  --conversation-list-collapsed-width: 40px;
}

/* ===== SEMANTIC ROLES - dark ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);

  --conversation-active-bar: var(--brand-400);
  --conversation-active-bg: rgba(46, 141, 255, 0.12);
  --code-bg: rgba(255, 255, 255, 0.06);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="settings-ai-page">
      <div class="settings-ai-content">
        <h2 class="settings-ai-title">AI 配置</h2>
        <section class="settings-ai-section">
          <div class="settings-ai-section-title">API 配置列表</div>
          <div class="profile-list">
            <!-- Profile: DeepSeek -->
            <div class="profile-card">
              <div class="profile-card-left">
                <div class="profile-card-name">DeepSeek</div>
                <div class="profile-card-meta">
                  <span class="profile-card-model">deepseek-chat</span>
                  <span class="profile-card-tags">
                    <span class="tag tag-enabled">联网&#10003;</span>
                    <span class="tag tag-disabled">图片&#10007;</span>
                  </span>
                </div>
              </div>
              <div class="profile-card-actions">
                <button class="btn-text btn-text-edit">编辑</button>
                <button class="btn-text btn-text-delete">删除</button>
              </div>
            </div>

            <!-- Profile: OpenAI -->
            <div class="profile-card">
              <div class="profile-card-left">
                <div class="profile-card-name">OpenAI</div>
                <div class="profile-card-meta">
                  <span class="profile-card-model">gpt-4o-mini</span>
                  <span class="profile-card-tags">
                    <span class="tag tag-enabled">联网&#10003;</span>
                    <span class="tag tag-enabled">图片&#10003;</span>
                  </span>
                </div>
              </div>
              <div class="profile-card-actions">
                <button class="btn-text btn-text-edit">编辑</button>
                <button class="btn-text btn-text-delete">删除</button>
              </div>
            </div>

            <!-- Profile: Ollama 本地 -->
            <div class="profile-card">
              <div class="profile-card-left">
                <div class="profile-card-name">Ollama 本地</div>
                <div class="profile-card-meta">
                  <span class="profile-card-model">llama3.1</span>
                  <span class="profile-card-tags">
                    <span class="tag tag-disabled">联网&#10007;</span>
                    <span class="tag tag-disabled">图片&#10007;</span>
                  </span>
                </div>
              </div>
              <div class="profile-card-actions">
                <button class="btn-text btn-text-edit">编辑</button>
                <button class="btn-text btn-text-delete">删除</button>
              </div>
            </div>
          </div>

          <!-- Add Button -->
          <button class="btn-add-profile">
            <span>+</span>
            <span>添加配置</span>
          </button>
        </section>
      </div>
    </main>
    <script>lucide.createIcons();</script>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* ===== Settings AI Configuration Page ===== */

      .settings-ai-page {
        display: flex;
        justify-content: center;
        padding: 32px 16px;
        min-height: 100vh;
        background: var(--background);
        font-family: var(--font-sans);
      }

      .settings-ai-content {
        width: 600px;
        max-width: 100%;
      }

      .settings-ai-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--foreground);
        margin-bottom: 20px;
      }

      .settings-ai-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-compact);
        padding: 20px 24px;
      }

      .settings-ai-section-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--muted-foreground);
        margin-bottom: 12px;
      }

      .profile-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .profile-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-compact);
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .profile-card-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .profile-card-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--foreground);
      }

      .profile-card-meta {
        display: flex;
        align-items: center;
        gap: 0;
        flex-wrap: wrap;
      }

      .profile-card-model {
        font-size: 12px;
        color: var(--muted-foreground);
        font-family: var(--font-mono);
      }

      .profile-card-tags {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-left: 8px;
      }

      .tag {
        font-size: 11px;
        padding: 1px 6px;
        border-radius: var(--radius-tag);
        line-height: 1.4;
        white-space: nowrap;
      }

      .tag-enabled {
        background: var(--state-success-surface);
        color: var(--success);
      }

      .tag-disabled {
        background: var(--secondary);
        color: var(--muted-foreground);
      }

      .profile-card-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        margin-left: 16px;
      }

      .btn-text {
        font-size: 12px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        font-family: var(--font-sans);
        line-height: 1.4;
      }

      .btn-text:hover {
        text-decoration: underline;
      }

      .btn-text-edit {
        color: var(--primary);
      }

      .btn-text-delete {
        color: var(--destructive);
      }

      .btn-add-profile {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: transparent;
        border: 1px dashed var(--primary);
        border-radius: var(--radius-button);
        padding: 8px 16px;
        color: var(--primary);
        font-size: 13px;
        font-family: var(--font-sans);
        cursor: pointer;
        width: 100%;
        justify-content: center;
      }

      .btn-add-profile:hover {
      background: var(--accent);
    }
    </style>
</body>
</html>
